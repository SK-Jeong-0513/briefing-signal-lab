name: Update dashboard data

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 평일 21:30 UTC (~06:30 KST, 미 증시 마감 후)
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # 데이터 갱신 후 배포 워크플로 트리거용

concurrency:
  group: dashboard-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch dashboard data (stdlib only)
        run: python3 scripts/fetch_dashboard.py
      - name: Commit, push & deploy if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/data/dashboard.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(data): 대시보드 지표 자동 갱신"
            git pull --rebase origin main
            git push origin HEAD:main
            # GITHUB_TOKEN 푸시는 배포를 자동 트리거하지 않으므로 명시적으로 배포 실행
            gh workflow run deploy-pages.yml
          fi

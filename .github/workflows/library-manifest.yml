name: Build library manifest

on:
  push:
    branches: [main]
    paths:
      - "public/library/**"
      - "scripts/build_library_manifest.py"
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # manifest 갱신 후 배포 워크플로 트리거용

concurrency:
  group: library-manifest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build library manifest (stdlib only)
        run: python3 scripts/build_library_manifest.py
      - name: Commit, push & deploy if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/assets/data/library.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore(library): manifest 자동 갱신"
            git pull --rebase origin main
            git push origin HEAD:main
            # GITHUB_TOKEN 푸시는 배포를 자동 트리거하지 않으므로 명시적으로 배포 실행
            gh workflow run deploy-pages.yml
          fi

name: Market data (tickers)

# 무인 자동 발행: 평일 07:00 KST에 종목 브리핑 생성 → 시장-종목 Sheet.
# 일시 중지(Stop): GitHub Actions 탭 → 이 워크플로 → ⋯ → Disable workflow.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * 1-5"   # 평일 22:00 UTC = 07:00 KST

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Collect ticker briefings
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DATA_GO_DEEPSEEK }}
          GEMINI_API_KEY: ${{ secrets.DATA_GO_GEMINI }}
          MARKET_CONFIG_CSV: ${{ secrets.MARKET_CONFIG_CSV }}   # 종목설정 published CSV (없으면 시드)
          MARKET_WEBAPP_URL: ${{ secrets.MARKET_WEBAPP_URL }}   # 없으면 dry-run
          MARKET_WEBAPP_TOKEN: ${{ secrets.MARKET_WEBAPP_TOKEN }}
        run: python3 scripts/fetch_market.py

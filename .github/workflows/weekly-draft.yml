name: Weekly briefing draft

# 반자동 초안 수집(①②③): 매주 월 06:00 KST에 도메인별 후보 신호 카드를 생성 →
# '주간-초안' Sheet에 status=draft로 append. 발행 아님 — 사람이 시트에서 선별(④)해야 게시된다.
# 외부 발송 없음(구독자에게 전송하지 않음). 일시 중지(Stop): 이 워크플로 → ⋯ → Disable workflow.
on:
  workflow_dispatch:
    inputs:
      dry:
        description: "dry-run — 시트에 쓰지 않고 카드만 로그에 출력(품질 확인용)"
        type: boolean
        default: true
  schedule:
    - cron: "0 21 * * 0"   # 일 21:00 UTC = 월 06:00 KST

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Collect weekly draft signals
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DATA_GO_DEEPSEEK }}
          GEMINI_API_KEY: ${{ secrets.DATA_GO_GEMINI }}
          # BSL_market 웹앱 재사용: '주간-초안' 탭이 BSL_market에 있어야 함(웹앱이 헤더로 매핑).
          # 없으면 dry-run. 별도 시트로 분리 시 이 두 줄을 WEEKLY_* 시크릿으로 교체.
          WEEKLY_WEBAPP_URL: ${{ secrets.MARKET_WEBAPP_URL }}
          WEEKLY_WEBAPP_TOKEN: ${{ secrets.MARKET_WEBAPP_TOKEN }}
          SETTINGS_CSV: ${{ secrets.SETTINGS_CSV }}   # 'settings' 탭 게시 CSV(선택). pipeline_enabled=0이면 중지. 없으면 활성.
        # 수동 실행 dry=true(기본): --dry로 로그만. dry=false 또는 cron: 시트에 실제 write.
        run: python3 scripts/fetch_weekly.py ${{ inputs.dry && '--dry' || '' }}

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>금융 브리핑 — Briefing Signal Lab</title>
  <meta name="description" content="시장·실적·수급 신호를 매일 선별해 요약하는 금융 브리핑. 무료 공개 요약 + 유료 키워드 맞춤 이메일 브리핑. 정보 제공이며 투자 조언이 아닙니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="wrap header__inner">
      <a class="brand" href="index.html" aria-label="Briefing Signal Lab">
        <svg class="brand__mark" viewBox="0 0 26 26" aria-hidden="true">
          <rect class="mark__bg" x="1" y="1" width="24" height="24" rx="6"/>
          <path class="mark__line" d="M4 17 L9 11 L13 14 L17 7 L22 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="mark__dot" cx="17" cy="7" r="2"/>
        </svg>
        <span class="brand__name" data-i18n="brand"></span>
      </a>
      <nav class="nav" aria-label="주요">
        <a class="nav__link" href="index.html#samples" data-i18n="nav.samples"></a>
        <a class="nav__link" href="tech.html" data-i18n="nav.tech"></a>
        <a class="nav__link" href="finance.html" data-i18n="nav.finance"></a>
        <a class="nav__link" href="economy.html" data-i18n="nav.economy"></a>
        <a class="nav__link" href="index.html#dashboard" data-i18n="nav.dashboard"></a>
        <a class="nav__link" href="index.html#library" data-i18n="nav.library"></a>
        <a class="nav__link" href="calendar.html" data-i18n="nav.calendar"></a>
      </nav>
      <div class="header__actions">
        <div class="lang" role="group" aria-label="Language">
          <button type="button" data-lang="ko" aria-pressed="true">KO</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
        <a class="btn btn--primary btn--sm" data-link="freeForm" target="_blank" rel="noopener" data-i18n="nav.subscribe"></a>
      </div>
    </div>
  </header>

  <main id="top">

    <!-- ── 페이지 인트로 ── -->
    <section class="band">
      <div class="wrap page-intro reveal">
        <a class="nav__link" href="index.html" data-i18n="techPage.backHome" style="display:inline-block;margin-bottom:16px;"></a>
        <p class="eyebrow" data-i18n="financePage.eyebrow"></p>
        <h1 class="page-intro__title" data-i18n="financePage.title"></h1>
        <p class="section-sub" data-i18n="financePage.intro"></p>
      </div>
    </section>

    <!-- ── 무료 브리핑 피드 ── -->
    <section class="band band--surface" id="feed">
      <div class="wrap">
        <h2 class="section-title reveal" data-i18n="financePage.feedHeading"></h2>
        <div class="grid-3" data-feed-category="finance"></div>
      </div>
    </section>

    <!-- ── 유료 키워드 맞춤 섹션 ── -->
    <section class="band">
      <div class="wrap reveal">
        <p class="eyebrow" data-i18n="techPage.paidEyebrow"></p>
        <h2 class="section-title" data-i18n="techPage.paidTitle"></h2>
        <p class="section-sub" data-i18n="techPage.paidBody"></p>
        <p class="topics-label" data-i18n="techPage.topicsLabel"></p>
        <div class="topic-chips" data-topics="finance"></div>
        <div style="margin-top:28px;">
          <a class="btn btn--primary" data-link="paidForm" target="_blank" rel="noopener" data-i18n="techPage.paidCta"></a>
        </div>
        <p class="footer__disc" data-i18n="techPage.paidNote" style="margin-top:16px;"></p>
      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="footer">
    <div class="wrap footer__inner">
      <div class="footer__brand">
        <svg class="brand__mark" viewBox="0 0 26 26" aria-hidden="true">
          <rect class="mark__bg" x="1" y="1" width="24" height="24" rx="6"/>
          <path class="mark__line" d="M4 17 L9 11 L13 14 L17 7 L22 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="mark__dot" cx="17" cy="7" r="2"/>
        </svg>
        <span data-i18n="brand"></span>
      </div>
      <div>
        <p class="footer__disc-title" data-i18n="footer.disclaimerTitle"></p>
        <p class="footer__disc" data-i18n="footer.disclaimer"></p>
      </div>
      <p class="footer__disc" data-i18n="footer.sourceNote"></p>
      <div class="footer__meta">
        <span data-i18n="footer.rights"></span>
        <span>paun.jeong@gmail.com</span>
      </div>
    </div>
  </footer>

  <!-- 금융 데이터 → 공통 콘텐츠(site.js) → 렌더 스크립트 -->
  <script src="assets/content/finance.js"></script>
  <script src="assets/content/site.js"></script>
  <script src="assets/script.js"></script>

</html>

<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="wrap header__inner">
      <a class="brand" href="index.html" aria-label="Briefing Signal Lab">
        <svg class="brand__mark" viewBox="0 0 26 26" aria-hidden="true">
          <rect class="mark__bg" x="1" y="1" width="24" height="24" rx="6"/>
          <path class="mark__line" d="M4 17 L9 11 L13 14 L17 7 L22 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="mark__dot" cx="17" cy="7" r="2"/>
        </svg>
        <span class="brand__name" data-i18n="brand"></span>
      </a>
      <nav class="nav" aria-label="주요">
        <a class="nav__link" href="tech.html" data-i18n="nav.tech"></a>
        <a class="nav__link" href="economy.html" data-i18n="nav.economy"></a>
        <a class="nav__link" href="finance.html" data-i18n="nav.finance"></a>
        <a class="nav__link" href="market.html" data-i18n="nav.market"></a>
        <a class="nav__link" href="dashboard.html" data-i18n="nav.dashboard"></a>
        <a class="nav__link" href="library.html" data-i18n="nav.library"></a>
        <a class="nav__link" href="calendar.html" data-i18n="nav.calendar"></a>
      </nav>
      <div class="header__actions">
        <div class="lang" role="group" aria-label="Language">
          <button type="button" data-lang="ko" aria-pressed="true">KO</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
        <a class="btn btn--primary btn--sm" data-link="freeForm" target="_blank" rel="noopener" data-i18n="nav.subscribe"></a>
      </div>
    </div>
  </header>

  <main id="top" data-market>

    <!-- ── 페이지 인트로 ── -->
    <section class="band">
      <div class="wrap page-intro reveal">
        <a class="nav__link" href="index.html" data-i18n="marketPage.backHome" style="display:inline-block;margin-bottom:16px;"></a>
        <p class="eyebrow" data-i18n="marketPage.eyebrow"></p>
        <h1 class="page-intro__title" data-i18n="marketPage.title"></h1>
        <p class="section-sub" data-i18n="marketPage.sub"></p>
        <p class="mkt-ailabel">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
          <span data-i18n="marketPage.aiLabel"></span>
        </p>
      </div>
    </section>

    <!-- ── 설정 종목 브리핑 ── -->
    <section class="band band--surface">
      <div class="wrap">
        <h2 class="section-title reveal" data-i18n="marketPage.tickersHeading"></h2>
        <div class="lib-grid" data-market-tickers style="margin-top:var(--s-lg);"></div>
      </div>
    </section>

    <!-- ── 일일 시황 · 경제/금융/기술 ── -->
    <section class="band">
      <div class="wrap">
        <h2 class="section-title reveal" data-i18n="marketPage.dailyHeading"></h2>
        <div class="mkt-cattabs" data-market-cattabs role="tablist" style="margin-top:var(--s-md);"></div>
        <div class="mkt-daily" data-market-daily style="margin-top:var(--s-lg);"></div>
      </div>
    </section>

  </main>

  <!-- ── 푸터 ── -->
  <footer class="footer">
    <div class="wrap footer__inner">
      <div class="footer__brand">
        <svg class="brand__mark" viewBox="0 0 26 26" aria-hidden="true">
          <rect class="mark__bg" x="1" y="1" width="24" height="24" rx="6"/>
          <path class="mark__line" d="M4 17 L9 11 L13 14 L17 7 L22 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle class="mark__dot" cx="17" cy="7" r="2"/>
        </svg>
        <span data-i18n="brand"></span>
      </div>
      <div>
        <p class="footer__disc-title" data-i18n="footer.disclaimerTitle"></p>
        <p class="footer__disc" data-i18n="footer.disclaimer"></p>
      </div>
      <p class="footer__disc" data-i18n="footer.sourceNote"></p>
      <div class="footer__meta">
        <span data-i18n="footer.rights"></span>
        <a href="mailto:paun.jeong@gmail.com">paun.jeong@gmail.com</a>
      </div>
    </div>
  </footer>

  <script src="assets/content/market.js"></script>
  <script src="assets/content/site.js"></script>
  <script src="assets/script.js"></script>
